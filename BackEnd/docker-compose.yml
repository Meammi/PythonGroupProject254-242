services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clean_fastapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clean_fastapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: Clean FastAPI Backend
      APP_ENV: docker
      APP_DEBUG: "true"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/clean_fastapi
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
